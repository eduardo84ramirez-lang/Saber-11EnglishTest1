<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saber 11 - English Practice Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .question-card { transition: all 0.3s ease; }
        .option-label { cursor: pointer; display: block; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px; }
        .option-input:checked + .option-label { border-color: #3b82f6; background-color: #eff6ff; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="setup-screen" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg mt-10">
        <h1 class="text-2xl font-bold text-blue-800 mb-4">Saber 11 English Mock Test</h1>
        <p class="text-gray-600 mb-6 italic text-sm">Welcome! This test follows the 2024 ICFES structure. Please enter your name to start.</p>
        <div class="mb-4">
            <label class="block text-sm font-semibold mb-2">Nombre Completo del Estudiante:</label>
            <input type="text" id="student-name" class="w-full p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ej: Juan Pérez">
        </div>
        <button onclick="startExam()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
            Comenzar Examen
        </button>
    </div>

    <div id="exam-container" class="max-w-4xl mx-auto hidden">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-lg shadow-sm border-b-4 border-blue-500">
            <div>
                <h2 class="text-xl font-bold text-gray-800" id="header-part-title">PARTE 1</h2>
                <p class="text-sm text-gray-500" id="student-display-name"></p>
            </div>
            <div class="text-right">
                <span class="text-sm font-bold text-blue-600">Pregunta <span id="current-q-idx">1</span> de 25</span>
                <div class="w-32 bg-gray-200 h-2 rounded-full mt-1">
                    <div id="progress-bar" class="bg-blue-500 h-2 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="question-area" class="bg-white p-6 rounded-xl shadow-md min-h-[400px]">
            <!-- Content will be injected here via JS -->
        </div>

        <div class="flex justify-between mt-6">
            <button id="prev-btn" onclick="prevQuestion()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-6 rounded-lg opacity-50 cursor-not-allowed">
                Anterior
            </button>
            <button id="next-btn" onclick="nextQuestion()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md">
                Siguiente
            </button>
        </div>
    </div>

    <!-- Results Modal -->
    <div id="result-screen" class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-lg mt-10 hidden">
        <h2 class="text-3xl font-bold text-center text-blue-800 mb-2">Test Completed!</h2>
        <p class="text-center text-gray-500 mb-6">Excellent effort. Here are your results.</p>
        
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-blue-50 p-4 rounded-lg text-center border border-blue-100">
                <span class="block text-sm uppercase text-gray-500 font-bold">Puntaje</span>
                <span class="text-4xl font-black text-blue-600" id="final-score">0/25</span>
            </div>
            <div class="bg-green-50 p-4 rounded-lg text-center border border-green-100">
                <span class="block text-sm uppercase text-gray-500 font-bold">Porcentaje</span>
                <span class="text-4xl font-black text-green-600" id="final-percentage">0%</span>
            </div>
        </div>

        <div class="space-y-4">
            <button onclick="downloadPDF()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-2">
                Descargar Reporte PDF para Docente
            </button>
            <button onclick="location.reload()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg">
                Reiniciar Práctica
            </button>
        </div>
    </div>

    <script>
        const apiKey = ""; // Provisioned at runtime
        const examData = [
            // PART 1: Signs
            {
                part: 1,
                title: "PARTE 1",
                instruction: "¿Dónde puede ver estos avisos?",
                question: "1. Please keep off the grass",
                options: ["A. in a stadium", "B. in a park", "C. in a library"],
                correct: 1, // B
                type: "sign"
            },
            {
                part: 1,
                title: "PARTE 1",
                instruction: "¿Dónde puede ver estos avisos?",
                question: "2. Do not feed the animals",
                options: ["A. in a school", "B. in a shop", "C. in a zoo"],
                correct: 2, // C
                type: "sign"
            },
            // PART 2: Matching
            {
                part: 2,
                title: "PARTE 2",
                instruction: "Relacione las descripciones con la palabra adecuada.",
                context: "Descriptions about sports items:",
                question: "3. You use this to hit the ball in tennis.",
                options: ["A. Ball", "B. Racket", "C. Net", "D. Shoes"],
                correct: 1,
                type: "matching"
            },
            // PART 3: Conversations
            {
                part: 3,
                title: "PARTE 3",
                instruction: "Complete las conversaciones.",
                question: "4. Why don't we go to the cinema tonight?",
                options: ["A. That sounds great!", "B. I am a student.", "C. Yesterday was fun."],
                correct: 0,
                type: "conversation"
            },
            {
                part: 4,
                title: "PARTE 4: CLOZE",
                instruction: "Lea el texto y elija la palabra correcta.",
                text: "The History of Tea. Tea is one of the most popular (5) ____ in the world. It (6) ____ discovered in China thousands of years ago.",
                question: "5. Choose the best word:",
                options: ["A. drinks", "B. foods", "C. games"],
                correct: 0,
                type: "cloze"
            },
            {
                part: 4,
                title: "PARTE 4: CLOZE",
                instruction: "Lea el texto y elija la palabra correcta.",
                text: "The History of Tea. Tea is one of the most popular (5) drinks in the world. It (6) ____ discovered in China thousands of years ago.",
                question: "6. Choose the best word:",
                options: ["A. is", "B. was", "C. were"],
                correct: 1,
                type: "cloze"
            },
            // PART 5-6-7 Placeholder (Abbreviated for demo, but logic allows all 25)
            {
                part: 5,
                title: "PARTE 5: READING",
                instruction: "Lea el artículo y responda.",
                text: "Mount Everest is the highest mountain in the world. Many people try to climb it every year, but it is very dangerous due to the cold and the wind.",
                question: "7. Why is climbing Mount Everest dangerous?",
                options: ["A. Because it's too high.", "B. Because of the weather conditions.", "C. Because there are no roads."],
                correct: 1,
                imagePrompt: "Mount Everest covered in snow and wind",
                type: "reading"
            }
        ];

        // Fill remaining mock questions to reach 25 for result calculation
        for(let i=8; i<=25; i++) {
            examData.push({
                part: 7,
                title: "PARTE 7",
                instruction: "Complete el texto con la opción correcta.",
                question: `${i}. Select the best grammar option for sentence ${i}.`,
                options: ["A. Option A", "B. Option B", "C. Option C"],
                correct: 0,
                type: "general"
            });
        }

        let currentQuestion = 0;
        let userAnswers = new Array(examData.length).fill(null);
        let studentName = "";

        async function generateImage(prompt) {
            const container = document.getElementById('image-container');
            if (!container) return;
            container.innerHTML = `<div class="animate-pulse bg-gray-200 h-48 w-full rounded-lg flex items-center justify-center">Generando imagen...</div>`;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ instances: { prompt: prompt }, parameters: { sampleCount: 1 } })
                });
                const result = await response.json();
                const imageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                container.innerHTML = `<img src="${imageUrl}" class="w-full h-48 object-cover rounded-lg shadow-sm mb-4" alt="Visual aid">`;
            } catch (error) {
                container.innerHTML = ""; // Silent fail
            }
        }

        function startExam() {
            studentName = document.getElementById('student-name').value;
            if (!studentName.trim()) {
                alert("Por favor ingresa tu nombre.");
                return;
            }
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('exam-container').classList.remove('hidden');
            document.getElementById('student-display-name').innerText = studentName;
            renderQuestion();
        }

        function renderQuestion() {
            const data = examData[currentQuestion];
            const area = document.getElementById('question-area');
            document.getElementById('current-q-idx').innerText = currentQuestion + 1;
            document.getElementById('header-part-title').innerText = data.title;
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / examData.length) * 100}%`;

            let html = `
                <p class="text-blue-600 font-bold mb-2 uppercase tracking-wide text-xs">${data.instruction}</p>
                ${data.text ? `<div class="bg-gray-50 p-4 rounded-lg mb-4 text-gray-700 italic border-l-4 border-blue-400">${data.text}</div>` : ''}
                <div id="image-container"></div>
                <h3 class="text-lg font-semibold mb-6 text-gray-800">${data.question}</h3>
                <div class="space-y-3">
            `;

            data.options.forEach((opt, idx) => {
                const isChecked = userAnswers[currentQuestion] === idx ? 'checked' : '';
                html += `
                    <div class="relative">
                        <input type="radio" name="option" id="opt-${idx}" class="option-input hidden" value="${idx}" ${isChecked} onchange="saveAnswer(${idx})">
                        <label for="opt-${idx}" class="option-label hover:border-blue-300 transition-colors">
                            ${opt}
                        </label>
                    </div>
                `;
            });

            html += `</div>`;
            area.innerHTML = html;

            if (data.imagePrompt) {
                generateImage(data.imagePrompt);
            }

            // Update nav buttons
            const prevBtn = document.getElementById('prev-btn');
            if (currentQuestion === 0) {
                prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                prevBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }

            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = currentQuestion === examData.length - 1 ? "Finalizar" : "Siguiente";
        }

        function saveAnswer(idx) {
            userAnswers[currentQuestion] = idx;
        }

        function nextQuestion() {
            if (userAnswers[currentQuestion] === null) {
                alert("Por favor selecciona una respuesta.");
                return;
            }
            if (currentQuestion < examData.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        function showResults() {
            let correctCount = 0;
            examData.forEach((q, i) => {
                if (userAnswers[i] === q.correct) correctCount++;
            });

            document.getElementById('exam-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${correctCount}/${examData.length}`;
            document.getElementById('final-percentage').innerText = `${Math.round((correctCount/examData.length)*100)}%`;
        }

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let correctCount = 0;
            const rows = [];

            examData.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.correct;
                if (isCorrect) correctCount++;
                rows.push([
                    i + 1,
                    q.title,
                    q.options[userAnswers[i]].substring(0, 1),
                    q.options[q.correct].substring(0, 1),
                    isCorrect ? "CORRECTO" : "INCORRECTO"
                ]);
            });

            const score = Math.round((correctCount/examData.length)*100);

            doc.setFontSize(20);
            doc.text("Reporte de Resultados - Saber 11 Inglés", 14, 20);
            
            doc.setFontSize(12);
            doc.text(`Estudiante: ${studentName}`, 14, 30);
            doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 14, 37);
            doc.text(`Puntaje Final: ${correctCount} / ${examData.length} (${score}%)`, 14, 44);

            doc.autoTable({
                startY: 55,
                head: [['No.', 'Parte', 'Tu Rpta', 'Correcta', 'Estado']],
                body: rows,
                theme: 'striped',
                headStyles: { fillColor: [59, 130, 246] }
            });

            doc.save(`Resultado_Saber11_${studentName.replace(/\s+/g, '_')}.pdf`);
        }
    </script>
</body>
</html>
